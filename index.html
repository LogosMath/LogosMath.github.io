<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LOGOSMATH</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">

<script defer
src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js">
</script>

<script defer
src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
onload="renderMathInElement(document.body);">
</script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#071426;

color:white;

font-family:
"Times New Roman",
serif;

overflow-x:hidden;
}

/* 背景グリッド */

.grid{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background-image:

linear-gradient(
rgba(255,255,255,0.04) 1px,
transparent 1px),

linear-gradient(
90deg,
rgba(255,255,255,0.04) 1px,
transparent 1px);

background-size:40px 40px;

z-index:-10;
}

/* 座標軸 */

.axis-x{

position:fixed;

top:50%;
left:0;

width:100%;
height:1px;

background:rgba(255,255,255,0.3);

z-index:-5;
}

.axis-y{

position:fixed;

left:50%;
top:0;

width:1px;
height:100%;

background:rgba(255,255,255,0.3);

z-index:-5;
}

header{

display:flex;

justify-content:space-between;

padding:30px 60px;
}

.logo{

font-size:2rem;

letter-spacing:8px;
}

nav a{

color:white;

text-decoration:none;

margin-left:40px;

font-size:1rem;
}

.hero{

min-height:90vh;

display:flex;

flex-direction:column;

justify-content:center;
align-items:center;

text-align:center;
}

.catch{

color:#d4a44c;

font-size:1.2rem;

margin-bottom:20px;
}

.title{

font-size:7rem;

letter-spacing:12px;

margin-bottom:30px;
}

.formula{

font-size:4rem;

margin-bottom:20px;
}

.subtitle{

font-size:1.6rem;

color:#9ca3af;
}

.cards{

display:flex;

justify-content:center;

gap:40px;

padding:80px;

flex-wrap:wrap;
}

.card{

width:320px;

padding:50px 30px;

border:1px solid rgba(212,164,76,.4);

background:
rgba(255,255,255,0.02);

backdrop-filter:blur(5px);

transition:.3s;
}

.card:hover{

transform:translateY(-10px);

border-color:#d4a44c;
}

.card h3{

font-size:2rem;

margin-bottom:25px;

color:#d4a44c;
}

.card p{

line-height:2;
}

.quote{

text-align:center;

padding:100px 20px;

font-size:2rem;

color:#d1d5db;
}

.author{

margin-top:20px;

color:#d4a44c;

font-size:1.2rem;
}

footer{

text-align:center;

padding:50px;

color:#6b7280;
}

@media(max-width:900px){

.title{
font-size:4rem;
}

.formula{
font-size:2.5rem;
}

.cards{
padding:40px;
}

}

</style>

</head>

<body>

<div class="grid"></div>

<div class="axis-x"></div>
<div class="axis-y"></div>

<header>

<div class="logo">
LOGOSMATH
</div>

<nav>

<a href="#">ホーム</a>

<a href="#">問題集</a>

<a href="#">コラム</a>

<a href="#">数学の美しさ</a>

</nav>

</header>

<section class="hero">

<div class="catch">

数学の美しさを探究する

</div>

<div class="title">

LOGOSMATH

</div>

<div class="formula">

$$e^{i\pi}+1=0$$

</div>

<div class="subtitle">

The most beautiful equation

</div>

</section>

<section class="cards">

<div class="card">

<h3>問題集</h3>

<p>

高校数学から大学数学まで。

厳選した問題を収録。

</p>

</div>

<div class="card">

<h3>コラム</h3>

<p>

数学の考え方や歴史、

美しい証明を解説。

</p>

</div>

<div class="card">

<h3>数学の美しさ</h3>

<p>

定理や公式の背後にある

深い構造を探る。

</p>

</div>

</section>

<section class="quote">

数学は、真理への最も美しい言葉。

<div class="author">

— Carl Friedrich Gauss —

</div>

</section>

<footer>

© LOGOSMATH

</footer>

</body>
</html>
