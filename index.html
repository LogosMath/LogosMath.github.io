<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">

<script defer
src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js">
</script>

<script defer
src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
onload="renderMathInElement(document.body);">
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LogosMath</title>

<style>

body{
    margin:0;
    height:100vh;

    background:#0f172a;
    color:#f8fafc;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    font-family:Georgia, serif;
}

.background-math{
    position:absolute;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:6rem;

    color:rgba(255,255,255,0.04);

    user-select:none;
}

.container{
    text-align:center;
    z-index:10;
    padding:20px;
}

.logo{
    font-size:4rem;
    letter-spacing:6px;
    margin-bottom:10px;
}

.subtitle{
    font-size:1.2rem;
    color:#cbd5e1;
    line-height:1.8;
    margin-bottom:40px;
}

.formula{
    font-size:2rem;
    margin-bottom:30px;
    color:#e2e8f0;
}

.description{
    color:#94a3b8;
    margin-bottom:50px;
}

.btn{
    display:inline-block;

    margin:8px;
    padding:14px 28px;

    border:1px solid #94a3b8;

    color:white;
    text-decoration:none;

    transition:0.3s;
}

.btn:hover{
    background:white;
    color:#0f172a;
}

</style>
</head>

<body>

<div class="background-math">
    ∫ f(x)dx &nbsp;&nbsp; e<sup>iπ</sup>+1=0 &nbsp;&nbsp; Σ
</div>

<div class="container">

    <div class="logo">
        LOGOSMATH
    </div>

    <div class="subtitle">
        Mathematics<br>
        Logic<br>
        Education
    </div>

    <div class="formula">
        $$
　　　　　e^{i\pi}+1=0
　　　　　$$
    </div>

    <div class="description">
        思考の海を冒険する
    </div>

    <a href="#" class="btn">基本問題</a>
    <a href="#" class="btn">入試問題</a>
    <a href="#" class="btn">コラム</a>

</div>

</body>
</html>
