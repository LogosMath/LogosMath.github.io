<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogosMath</title>

    <style>

        body{
            margin:0;
            background:#f5f5f5;
            color:#222;
            font-family: "Helvetica Neue", sans-serif;
        }

        .hero{
            height:100vh;

            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;

            text-align:center;
        }

        h1{
            font-size:4rem;
            margin-bottom:10px;
            letter-spacing:2px;
        }

        h2{
            font-weight:300;
            color:#666;
            margin-bottom:20px;
        }

        p{
            font-size:1.2rem;
            color:#555;
        }

        .buttons{
            margin-top:40px;
        }

        .btn{

            display:inline-block;

            padding:14px 28px;
            margin:10px;

            border:1px solid #222;

            text-decoration:none;
            color:#222;

            transition:0.3s;
        }

        .btn:hover{
            background:#222;
            color:white;
        }

    </style>
</head>

<body>

<div class="hero">

    <h1>LogosMath</h1>

    <h2>Mathematics & Learning</h2>

    <p>
        数学の美しさを探究するサイト
    </p>

    <div class="buttons">

        <a class="btn" href="#">
            基本問題
        </a>

        <a class="btn" href="#">
            入試問題
        </a>

        <a class="btn" href="#">
            コラム
        </a>

    </div>

</div>

</body>
</html>
